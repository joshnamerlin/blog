{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" type="image/png" href="{% static 'image.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body{
            background-color:lightblue;
            min-height: 100vh;   
            flex-direction: column;
            display: flex;
            align-items: center;
            justify-content: center;        
        }
        .form-box{
            width: 400px;
            align-self: center;
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 5px;
        }
        h1{
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;color: darkmagenta;">Register</h1>
    <div class="form-box"> 
    <form method="post"> 
         {% csrf_token %}   
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>   <!--for is used to link the input with the id when u just the username the cursor go to the input-->
            <input type="text" class="form-control" id="name" placeholder="Enter your name" name="name">
        </div>
        <div class="mb-3">        <!--mb-3 is used to give margin bottom of 3-->
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" name="phone">  <!--name is used to get the value in views.py using request.POST.get('name') -->
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" placeholder="Enter your email" name="email">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" name="password">
        </div>
        <div class="mb-3">
            <label for="confirm_password" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirm_password" placeholder="Confirm your password" name="confirm_password">
        </div>
        <center>
            <button type="submit" class="btn btn-primary">Submit</button>
            <div>
                <a href="{% url 'login' %}">Already have an account? Login here</a>
            </div>
        </center>
    </form>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
